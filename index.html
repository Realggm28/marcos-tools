<style>

  .navbar {

</head>
<body>

<!-- HOME -->
<div id="page-home" class="page active">
  <div class="home-inner">
    <div class="home-header">
      <div class="home-logo">mar<span>cos</span></div>
      <div class="home-sub">AI Tools — Powered by Claude</div>
    </div>

    <div class="home-divider"></div>

    <div class="tool-cards">
      <div class="tool-card" onclick="navigate('chat')">
        <div class="card-icon">◈</div>
        <div class="card-title">ch<span>at</span></div>
        <div class="card-desc">Ask anything. Upload PDFs, images, and more.</div>
        <div class="card-arrow">Open ›</div>
      </div>

      <div class="tool-card" onclick="navigate('rewriter')">
        <div class="card-icon">✦</div>
        <div class="card-title">re<span>write</span></div>
        <div class="card-desc">Rewrite paragraphs in different tones.</div>
        <div class="card-arrow">Open ›</div>
      </div>
    </div>

    <div class="home-footer">One file · No installs · Works on Chromebook</div>
  </div>
</div>

<!-- CHAT -->
<div id="page-chat" class="page">

<div class="chat-wrap" id="chatWrap"></div>

<textarea id="msgInput"></textarea>
<button onclick="sendMessage()">Send</button>

</div>

<!-- REWRITER -->
<div id="page-rewriter" class="page">

<textarea id="inputText"></textarea>
<button onclick="rewrite()">Rewrite</button>
<div id="outputText"></div>

</div>

<script>

let conversationHistory = [];

function navigate(page){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById('page-'+page).classList.add('active');
}

async function sendMessage(){

const text=document.getElementById("msgInput").value;

conversationHistory.push({
role:"user",
content:text
});

const res=await fetch("https://marcos-tools-api.marcosggarcia.workers.dev",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
model:"claude-3-5-sonnet-20241022",
max_tokens:1000,
stream:true,
messages:conversationHistory
})
});

if (!res.ok) {
  const errText = await res.text();
  throw new Error(errText || `API error ${res.status}`);
}

const reader=res.body.getReader();
const decoder=new TextDecoder();

let fullText="";

while(true){
const {done,value}=await reader.read();
if(done) break;

const chunk=decoder.decode(value);

for(const line of chunk.split("\n")){
if(line.startsWith("data: ")){

const p=JSON.parse(line.slice(6));

if(p.delta?.text){
fullText+=p.delta.text;
document.getElementById("chatWrap").innerText=fullText;
}

}
}
}

conversationHistory.push({
role:"assistant",
content:fullText
});

}

async function rewrite(){

const text=document.getElementById("inputText").value;

const res=await fetch("https://marcos-tools-api.marcosggarcia.workers.dev",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
model:"claude-3-5-sonnet-20241022",
max_tokens:1000,
stream:true,
messages:[
{role:"user",content:text}
]
})
});

if (!res.ok) {
  const errText = await res.text();
  throw new Error(errText || `API error: ${res.status}`);
}

const reader=res.body.getReader();
const decoder=new TextDecoder();

let fullText="";

while(true){
const {done,value}=await reader.read();
if(done) break;

const chunk=decoder.decode(value);

for(const line of chunk.split("\n")){
if(line.startsWith("data: ")){

const p=JSON.parse(line.slice(6));

if(p.delta?.text){
fullText+=p.delta.text;
document.getElementById("outputText").innerText=fullText;
}

}
}
}

}

</script>

</body>
</html>
